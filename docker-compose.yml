services:
  db:
    image: postgres:16
    container_name: datech-db
    environment:
      POSTGRES_DB: datech
      POSTGRES_USER: datech
      POSTGRES_PASSWORD: datech
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    container_name: datech-backend
    environment:
      DB_URL: jdbc:postgresql://db:5432/datech
      DB_USER: datech
      DB_PASSWORD: datech
      PORT: 8080
    depends_on:
      - db
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
    container_name: datech-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  postgres_data:
